<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GEN - Global Education Network | Coming Soon</title>
    <meta
      name="description"
      content="Global Education Network - Providing free, quality education to students in medium and lower income countries. Launching soon."
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --color-bg: #0b1120;
        --color-primary: #3b82f6;
        --color-primary-light: #60a5fa;
        --color-accent: #f59e0b;
        --color-text: #e2e8f0;
        --color-text-muted: #94a3b8;
        --color-border: #1e293b;
        --font: "Inter", system-ui, -apple-system, sans-serif;
      }

      body {
        font-family: var(--font);
        background-color: var(--color-bg);
        color: var(--color-text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
      }

      .bg-glow {
        position: fixed;
        top: -40%;
        left: 50%;
        translate: -50% 0;
        width: 800px;
        height: 800px;
        background: radial-gradient(
          circle,
          rgba(59, 130, 246, 0.08) 0%,
          rgba(59, 130, 246, 0.02) 40%,
          transparent 70%
        );
        pointer-events: none;
        z-index: 0;
      }

      main {
        position: relative;
        z-index: 1;
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 2rem;
        opacity: 0;
        animation: fade-up 0.7s ease-out 0.1s forwards;
      }

      .brand {
        font-size: 1rem;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--color-primary-light);
        margin-bottom: 1.5rem;
      }

      h1 {
        font-size: clamp(2.25rem, 6vw, 3.5rem);
        font-weight: 800;
        line-height: 1.1;
        margin-bottom: 1rem;
        background: linear-gradient(135deg, #fff 30%, var(--color-primary-light));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .subtitle {
        font-size: 1.125rem;
        color: var(--color-text-muted);
        margin-bottom: 2.5rem;
      }

      .join-btn {
        display: inline-block;
        padding: 1rem 3rem;
        background: var(--color-primary);
        color: #fff;
        font-size: 1.125rem;
        font-weight: 600;
        font-family: var(--font);
        text-decoration: none;
        border-radius: 0.5rem;
        transition: background 0.2s, transform 0.1s;
      }

      .join-btn:hover {
        background: var(--color-primary-light);
      }

      .join-btn:active {
        transform: scale(0.97);
      }

      footer {
        position: relative;
        z-index: 1;
        text-align: center;
        padding: 1.5rem 2rem;
        border-top: 1px solid var(--color-border);
        color: var(--color-text-muted);
        font-size: 0.85rem;
      }

      @keyframes fade-up {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-glow" aria-hidden="true"></div>

    <main>
      <p class="brand">Global Education Network</p>
      <h1>Website Coming Soon</h1>
      <p class="subtitle">
        We're working on something meaningful. Stay tuned.
      </p>

      <a href="/register.html" class="join-btn">
        Join Us
      </a>
    </main>

    <footer>
      <p>&copy; <span id="year"></span> Global Education Network</p>
    </footer>

    <script>
      const yearEl = document.getElementById("year");
      if (yearEl) yearEl.textContent = new Date().getFullYear().toString();
    </script>
  </body>
</html>
