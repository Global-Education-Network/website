<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GEN - Register as a Volunteer / Supporter</title>
    <meta
      name="description"
      content="Register to volunteer or support the Global Education Network."
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/style.css" />
    <link rel="stylesheet" href="/src/register.css" />
  </head>
  <body>
    <div class="bg-glow" aria-hidden="true"></div>

    <main class="register-main">
      <p class="brand">Global Education Network</p>
      <h1>Join Us</h1>
      <p class="subtitle">
        Register as a volunteer or supporter and help us make a difference.
      </p>
      <a href="/" class="back-link">&larr; Back to Home</a>

      <form id="register-form" novalidate>
        <!-- Email -->
        <div class="form-group">
          <label for="email">Email <span class="required">*</span></label>
          <input type="email" id="email" name="email" required />
        </div>

        <!-- Name -->
        <div class="form-group">
          <label for="name">Name <span class="required">*</span></label>
          <input type="text" id="name" name="name" required />
        </div>

        <!-- Phone number -->
        <div class="form-group">
          <label for="contact">Phone number</label>
          <div class="phone-input-group">
            <select id="country-dialing-code" name="countryDialingCode" class="country-code-select">
              <option value="+47">🇳🇴 +47</option>
              <option value="+92">🇵🇰 +92</option>
              <option value="+1">🇺🇸 +1</option>
              <option value="+44">🇬🇧 +44</option>
              <option value="+49">🇩🇪 +49</option>
              <option value="+46">🇸🇪 +46</option>
              <option value="+45">🇩🇰 +45</option>
              <option value="+91">🇮🇳 +91</option>
              <option value="+971">🇦🇪 +971</option>
              <option value="+966">🇸🇦 +966</option>
            </select>
            <input type="tel" id="contact" name="contact" placeholder="Enter phone number" />
          </div>
        </div>

        <!-- Contributions -->
        <fieldset class="form-group">
          <legend>How would you like to contribute? <span class="required">*</span></legend>
          <label class="check-label">
            <input type="checkbox" name="contributions" value="Mentor" /> Mentor
          </label>
          <label class="check-label">
            <input type="checkbox" name="contributions" value="Donor" /> Donor
          </label>
          <label class="check-label">
            <input type="checkbox" name="contributions" value="IT/Technical support" /> IT/Technical support
          </label>
          <label class="check-label">
            <input type="checkbox" name="contributions" value="Legal support" /> Legal support
          </label>
          <label class="check-label">
            <input type="checkbox" name="contributions" value="Accounting" /> Accounting
          </label>
          <label class="check-label">
            <input type="checkbox" name="contributions" value="Case verification" /> Case verification
          </label>
          <label class="check-label">
            <input type="checkbox" name="contributions" value="Other" id="contrib-other-check" /> Other
          </label>
          <input
            type="text"
            id="contribution-other"
            name="contributionOther"
            placeholder="Please specify"
            class="other-input"
            disabled
          />
        </fieldset>

        <!-- Donation commitment -->
        <fieldset class="form-group donation-section">
          <legend>Monthly donation commitment</legend>
          <div class="currency-row">
            <label for="currency">Currency</label>
            <select id="currency" name="currency" class="currency-select">
              <option value="USD" selected>USD</option>
              <option value="NOK">NOK</option>
              <option value="EUR">EUR</option>
              <option value="GBP">GBP</option>
            </select>
          </div>
          <div class="donation-cards">
            <label class="donation-card">
              <input type="radio" name="donationCommitment" value="20" />
              <span class="card-amount">20</span>
            </label>
            <label class="donation-card recommended">
              <input type="radio" name="donationCommitment" value="30" />
              <span class="card-badge">Recommended</span>
              <span class="card-amount">30</span>
            </label>
            <label class="donation-card">
              <input type="radio" name="donationCommitment" value="50" />
              <span class="card-amount">50</span>
            </label>
            <label class="donation-card">
              <input type="radio" name="donationCommitment" value="other" id="donation-other-radio" />
              <span class="card-amount">Other</span>
            </label>
          </div>
          <input
            type="number"
            id="donation-other"
            name="donationOther"
            placeholder="Enter custom amount"
            class="other-input"
            min="1"
            step="any"
            disabled
          />
        </fieldset>

        <!-- Contact permission -->
        <fieldset class="form-group">
          <legend>May we contact you? <span class="required">*</span></legend>
          <label class="radio-label">
            <input type="radio" name="contactPermission" value="yes" required /> Yes
          </label>
          <label class="radio-label">
            <input type="radio" name="contactPermission" value="no" /> No
          </label>
        </fieldset>

        <!-- Feedback -->
        <div class="form-group">
          <label for="feedback">Feedback or comments</label>
          <textarea id="feedback" name="feedback" rows="4"></textarea>
        </div>

        <button type="submit" class="join-btn submit-btn">Submit</button>

        <p id="form-message" class="form-message" hidden></p>
      </form>
    </main>

    <footer>
      <p>&copy; <span id="year"></span> Global Education Network</p>
    </footer>

    <script type="module" src="/src/register.ts"></script>
  </body>
</html>
